name: CodeQL Advanced

on:
  pull_request:
    branches:
      - main
  merge_group:
  push:
    branches:
      - main
  schedule:
    - cron: "23 8 * * 3"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: codeql-advanced::${{ github.ref }}
  cancel-in-progress: false

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    permissions:
      actions: read
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - language: actions
            build_mode: none
            config_file: ./.codeql-runtime/codeql-actions.yml
          - language: rust
            build_mode: none
            config_file: ./.github/codeql/codeql-rust.yml

    steps:
      - name: Checkout repository
        # actions/checkout v4
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Install Rust toolchain for CodeQL
        if: ${{ matrix.language == 'rust' }}
        # dtolnay/rust-toolchain stable
        uses: dtolnay/rust-toolchain@67ef31d5b988238dd797d409d6f9574278e20537
        with:
          toolchain: stable

      - name: Prepare Actions CodeQL query pack config
        if: ${{ matrix.language == 'actions' }}
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p .codeql-runtime
          pack_path="./.github/codeql/actions-workflow-security"

          if [[ '${{ github.event_name }}' == 'pull_request' &&
            '${{ github.event.pull_request.head.repo.full_name }}' != '${{ github.repository }}' ]]; then
            trusted_root="${GITHUB_WORKSPACE}/.codeql-runtime/trusted-base"
            trusted_pack="./.codeql-runtime/trusted-base/.github/codeql/actions-workflow-security"
            mkdir -p "${trusted_root}"

            git fetch --no-tags --depth=1 origin '${{ github.event.pull_request.base.sha }}'
            git archive '${{ github.event.pull_request.base.sha }}' .github/codeql/actions-workflow-security |
              tar -x -C "${trusted_root}"
            pack_path="${trusted_pack}"
          fi

          {
            echo "name: oci-email-delivery-mcp-codeql-actions-runtime"
            echo
            echo "queries:"
            echo "  - uses: security-and-quality"
            echo "  - uses: ${pack_path}"
            echo
            echo "threat-models: [local]"
          } > .codeql-runtime/codeql-actions.yml

      - name: Initialize CodeQL
        # github/codeql-action v4
        uses: github/codeql-action/init@8aad20d150bbac5944a9f9d289da16a4b0d87c1e
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build_mode }}
          config-file: ${{ matrix.config_file }}

      - name: Perform CodeQL analysis
        # github/codeql-action v4
        uses: github/codeql-action/analyze@8aad20d150bbac5944a9f9d289da16a4b0d87c1e
        with:
          category: "/language:${{ matrix.language }}"

  results:
    name: CodeQL required gate
    needs:
      - analyze
    if: always()
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      actions: read
    steps:
      - name: Summarize
        shell: bash
        run: |
          set -euo pipefail
          echo "analyze: ${{ needs.analyze.result }}"
          if [[ '${{ needs.analyze.result }}' != 'success' ]]; then
            echo 'CodeQL analysis failed.'
            exit 1
          fi
