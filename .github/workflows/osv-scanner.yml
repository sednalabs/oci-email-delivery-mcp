name: OSV-Scanner

on:
  pull_request:
    branches:
      - main
  merge_group:
    branches:
      - main
  schedule:
    - cron: "23 17 * * 1"
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: osv-scanner::${{ github.ref }}
  cancel-in-progress: true

jobs:
  scan:
    name: OSV dependency scan
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout repository
        # actions/checkout v4
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Run OSV scanner
        # google/osv-scanner-action v2.3.8
        uses: google/osv-scanner-action/osv-scanner-action@fa4ff678dd5d0a4fa3d628e57af8162873e93cd6
        with:
          scan-args: |-
            --output=results.json
            --format=json
            -r
            --skip-git
            ./
        continue-on-error: true

      - name: Build OSV SARIF report
        # google/osv-scanner-action v2.3.8
        uses: google/osv-scanner-action/osv-reporter-action@fa4ff678dd5d0a4fa3d628e57af8162873e93cd6
        with:
          scan-args: |-
            --output=results.sarif
            --new=results.json
            --gh-annotations=false
            --fail-on-vuln=true

      - name: Upload OSV SARIF artifact
        # actions/upload-artifact v4
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        if: ${{ !cancelled() }}
        with:
          name: osv-scanner-sarif
          path: results.sarif
          if-no-files-found: error
          retention-days: 5

      - name: Upload OSV results to code scanning
        # github/codeql-action v4
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e
        if: ${{ !cancelled() }}
        with:
          sarif_file: results.sarif
